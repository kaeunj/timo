<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <title>TIMO — Team In, Move on</title>

  <!-- CDN 폰트 --> 
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Pretendard/Pretendard.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/SCDream.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/pages/onboarding.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
  <link rel="stylesheet" href="css/pages/quiz.css" />
  <link rel="stylesheet" href="css/pages/home.css" />
  <link rel="stylesheet" href="css/pages/project.css" />
  <link rel="stylesheet" href="css/pages/community.css" />
  <link rel="stylesheet" href="css/pages/mypage.css" />
</head>
<body>

  <!-- ① 앱 전체 래퍼 -->
  <div id="app">

    <!-- ② 상태바 -->
    <div class="status-bar" aria-hidden="true"></div>

    <!-- ③ 페이지 섹션 (16개) -->

    <!-- [인증 플로우] -->

    <!-- ── 온보딩 1 ── -->
    <section data-page="onboarding-1" class="page" aria-label="온보딩 1">
      <div class="onboarding__header">
        <img src="assets/images/logo.png" alt="TIMO" class="onboarding__logo" />
      </div>

      <div class="onboarding__content">
        <img
          src="assets/images/onboarding-1-illust.jpg"
          alt=""
          class="onboarding__illustration"
          aria-hidden="true"
        />
        <div class="onboarding__text">
          <h2 class="onboarding__title">함께할 팀원을<br>찾고 있나요?</h2>
          <p class="onboarding__subtitle">
            공모전, 해커톤, 사이드 프로젝트까지<br>
            나와 잘 맞는 팀원을 만나보세요.
          </p>
        </div>
      </div>

      <div class="onboarding__footer">
        <button class="onboarding__btn" id="onboarding-1-next">시작하기</button>
        <div class="pagination-dots" aria-label="페이지 1/3">
          <div class="pagination-dots__dot pagination-dots__dot--active"></div>
          <div class="pagination-dots__dot"></div>
          <div class="pagination-dots__dot"></div>
        </div>
      </div>
    </section>

    <!-- ── 온보딩 2 ── -->
    <section data-page="onboarding-2" class="page" aria-label="온보딩 2">
      <div class="onboarding__header">
        <img src="assets/images/logo.png" alt="TIMO" class="onboarding__logo" />
      </div>

      <div class="onboarding__content">
        <img
          src="assets/images/onboarding-2-illust.png"
          alt=""
          class="onboarding__illustration"
          aria-hidden="true"
        />
        <div class="onboarding__text">
          <h2 class="onboarding__title">성향이 맞는 사람과<br>협업하세요</h2>
          <p class="onboarding__subtitle">
            협업 스타일과 역량을 기반으로<br>
            팀원을 추천해드립니다.
          </p>
        </div>
      </div>

      <div class="onboarding__footer">
        <button class="onboarding__btn" id="onboarding-2-next">다음</button>
        <div class="pagination-dots" aria-label="페이지 2/3">
          <div class="pagination-dots__dot"></div>
          <div class="pagination-dots__dot pagination-dots__dot--active"></div>
          <div class="pagination-dots__dot"></div>
        </div>
      </div>
    </section>

    <!-- ── 로그인 ── -->
    <section data-page="login" class="page" aria-label="로그인">
      <div class="auth-login">

        <!-- 로고 -->
        <div class="auth-login__logo-section">
          <img src="assets/images/logo2.png" alt="TIMO" class="auth-login__logo-img" />
          <p class="auth-login__tagline">Team In, Move on</p>
        </div>

        <!-- 이메일/비밀번호 폼 -->
        <form class="auth-login__form" id="login-form" novalidate>
          <div class="auth-form__group">
            <label class="auth-form__label" for="login-email">이메일</label>
            <input
              type="email"
              id="login-email"
              class="auth-form__input"
              placeholder="이메일을 입력하세요"
              autocomplete="email"
            />
          </div>
          <div class="auth-form__group">
            <label class="auth-form__label" for="login-password">비밀번호</label>
            <input
              type="password"
              id="login-password"
              class="auth-form__input"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
            />
          </div>
          <div class="auth-login__submit-wrap">
            <button type="submit" class="auth-btn--dark">로그인</button>
          </div>
        </form>

        <!-- 비밀번호 찾기 -->
        <div class="auth-login__extras">
          <button class="auth-login__forgot" type="button">비밀번호를 잊으셨나요?</button>
        </div>

        <!-- 구분선 -->
        <div class="auth-divider">
          <span class="auth-divider__line"></span>
          <span class="auth-divider__text">또는</span>
          <span class="auth-divider__line"></span>
        </div>

        <!-- 소셜 로그인 -->
        <div class="auth-social">
          <button class="auth-social__btn auth-social__btn--google" type="button" data-social="google">
            <img src="assets/icons/google-icon.svg" alt="" class="auth-social__icon" aria-hidden="true" />
            <span>Google로 로그인</span>
          </button>
          <button class="auth-social__btn auth-social__btn--kakao" type="button" data-social="kakao">
            <img src="assets/icons/kakaotalk-icon.svg" alt="" class="auth-social__icon" aria-hidden="true" />
            <span>카카오로 로그인</span>
          </button>
          <button class="auth-social__btn auth-social__btn--naver" type="button" data-social="naver">
            <img src="assets/icons/naver-icon.svg" alt="" class="auth-social__icon" aria-hidden="true" />
            <span>네이버로 로그인</span>
          </button>
        </div>

        <!-- 회원가입 유도 -->
        <p class="auth-login__signup-cta">
          계정이 없으신가요?
          <button class="auth-login__signup-link" type="button" id="go-signup">회원가입</button>
        </p>

      </div>
    </section>

    <!-- ── 회원가입 ── -->
    <section data-page="signup" class="page" aria-label="회원가입">
      <div class="auth-signup">

        <!-- 뒤로가기 -->
        <button class="auth-signup__back" type="button" id="signup-back" aria-label="뒤로가기">
          <img src="assets/icons/back-icon.svg" alt="" aria-hidden="true" />
        </button>

        <!-- 제목 -->
        <h1 class="auth-signup__title">회원가입</h1>
        <p class="auth-signup__subtitle">TIMO와 함께 팀을 만들어보세요</p>

        <!-- 폼 -->
        <form class="auth-signup__form" id="signup-form" novalidate>
          <div class="auth-form__group">
            <label class="auth-form__label" for="signup-nickname">닉네임</label>
            <input
              type="text"
              id="signup-nickname"
              class="auth-form__input"
              placeholder="닉네임을 입력하세요"
              autocomplete="nickname"
            />
          </div>
          <div class="auth-form__group">
            <label class="auth-form__label" for="signup-email">이메일</label>
            <input
              type="email"
              id="signup-email"
              class="auth-form__input"
              placeholder="이메일을 입력하세요"
              autocomplete="email"
            />
          </div>
          <div class="auth-form__group">
            <label class="auth-form__label" for="signup-password">비밀번호</label>
            <input
              type="password"
              id="signup-password"
              class="auth-form__input"
              placeholder="비밀번호를 입력하세요"
              autocomplete="new-password"
            />
          </div>
          <div class="auth-form__group">
            <label class="auth-form__label" for="signup-password-confirm">비밀번호 확인</label>
            <input
              type="password"
              id="signup-password-confirm"
              class="auth-form__input"
              placeholder="비밀번호를 다시 입력하세요"
              autocomplete="new-password"
            />
          </div>
          <div class="auth-signup__submit-wrap">
            <button type="submit" class="auth-btn--dark">회원가입</button>
          </div>
        </form>

      </div>
    </section>

    <!-- [성향 테스트 플로우] — JS(QuizPage)가 렌더링 -->
    <section data-page="quiz-1"      class="page" aria-label="성향테스트 1단계"></section>
    <section data-page="quiz-2"      class="page" aria-label="성향테스트 2단계"></section>
    <section data-page="quiz-3"      class="page" aria-label="성향테스트 3단계"></section>
    <section data-page="quiz-result" class="page" aria-label="성향테스트 결과"></section>

    <!-- [메인 플로우] -->
    <section data-page="home" class="page" aria-label="홈">
      <!-- Phase 3에서 구현 -->
    </section>

    <section data-page="project-detail" class="page" aria-label="프로젝트 상세">
      <!-- Phase 4에서 구현 -->
    </section>

    <section data-page="project-apply" class="page" aria-label="프로젝트 지원">
      <!-- Phase 4에서 구현 -->
    </section>

    <section data-page="apply-complete" class="page" aria-label="지원 완료">
      <!-- Phase 4에서 구현 -->
    </section>

    <section data-page="community" class="page" aria-label="커뮤니티">
      <!-- Phase 5에서 구현 -->
    </section>

    <section data-page="community-post" class="page" aria-label="커뮤니티 게시글">
      <!-- Phase 5에서 구현 -->
    </section>

    <section data-page="mypage" class="page" aria-label="마이페이지">
      <!-- Phase 6에서 구현 -->
    </section>

    <section data-page="project-review" class="page" aria-label="프로젝트 리뷰">
      <!-- Phase 6에서 구현 -->
    </section>

    <!-- ④ 바텀 네비게이션 -->
    <nav class="bottom-nav is-hidden" id="bottom-nav" role="navigation" aria-label="하단 메뉴">
      <button class="bottom-nav__item" data-nav="home" aria-label="홈">
        <img src="assets/icons/nav-home-icon.svg" alt="" aria-hidden="true" />
        <span>홈</span>
      </button>
      <button class="bottom-nav__item" data-nav="project" aria-label="프로젝트">
        <img src="assets/icons/nav-project-icon.svg" alt="" aria-hidden="true" />
        <span>프로젝트</span>
      </button>
      <button class="bottom-nav__item" data-nav="community" aria-label="커뮤니티">
        <img src="assets/icons/nav-community-icon.svg" alt="" aria-hidden="true" />
        <span>커뮤니티</span>
      </button>
      <button class="bottom-nav__item" data-nav="mypage" aria-label="마이페이지">
        <img src="assets/icons/nav-mypage-icon.svg" alt="" aria-hidden="true" />
        <span>마이페이지</span>
      </button>
    </nav>

    <!-- ⑤ 바텀시트 오버레이 -->
    <div class="bottom-sheet-overlay" id="bottom-sheet-overlay" aria-hidden="true"></div>

    <!-- ⑥ 바텀시트 -->
    <div class="bottom-sheet" id="bottom-sheet" role="dialog" aria-hidden="true" aria-label="옵션 메뉴">
      <div class="bottom-sheet__handle" aria-hidden="true"></div>
      <ul class="bottom-sheet__list" role="menu"></ul>
    </div>

    <!-- ⑦ 모달 -->
    <div class="modal" id="modal" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="modal__overlay"></div>
      <div class="modal__content">
        <h2 class="modal__title"></h2>
        <p class="modal__message"></p>
        <div class="modal__actions">
          <button class="btn modal__cancel">취소</button>
          <button class="btn modal__confirm">확인</button>
        </div>
      </div>
    </div>

    <!-- ⑧ 토스트 -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

  </div><!-- /#app -->

  <!-- JS (의존성 순서 준수) -->
  <script src="js/common.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/onboarding.js"></script>
  <script src="js/pages/auth.js"></script>
  <script src="js/pages/quiz.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/project.js"></script>
  <script src="js/pages/community.js"></script>
  <script src="js/pages/mypage.js"></script>
  <script src="js/router.js"></script>

  <!-- 바텀 네비 탭 이벤트 바인딩 -->
  <script>
    document.querySelectorAll('.bottom-nav__item').forEach((btn) => {
      btn.addEventListener('click', () => {
        const navKey = btn.dataset.nav;
        const pageMap = { home: 'home', project: 'home', community: 'community', mypage: 'mypage' };
        const target  = pageMap[navKey];
        if (target) Router.navigate(target);
      });
    });

    /* 바텀시트 오버레이 클릭 시 닫기 */
    document.getElementById('bottom-sheet-overlay')?.addEventListener('click', closeBottomSheet);

    /* 라우터 초기화 */
    Router.init();
  </script>

</body>
</html>
